<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso al Curso | Biblioteca del Técnico</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0a0e13;
      --surface: #111820;
      --border: #1e2d3d;
      --accent: #00c8ff;
      --accent2: #ff6b35;
      --text: #e0eaf5;
      --muted: #4a6278;
      --success: #00e896;
      --error: #ff4466;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Glow orbs */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,200,255,0.06) 0%, transparent 70%);
      top: -200px;
      right: -200px;
      pointer-events: none;
    }

    .glow-bottom {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,107,53,0.05) 0%, transparent 70%);
      bottom: -200px;
      left: -100px;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeDown 0.6s ease both;
    }

    .logo-icon {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 8px;
      filter: drop-shadow(0 0 12px rgba(0,200,255,0.5));
    }

    .logo-area h1 {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .logo-area p {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-top: 4px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 32px;
      position: relative;
      animation: fadeUp 0.6s ease 0.1s both;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,200,255,0.05);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 20px; right: 20px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.4;
    }

    .card-title {
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .card-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 28px;
      letter-spacing: 0.05em;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,200,255,0.1);
    }

    input::placeholder { color: var(--muted); }

    .btn {
      width: 100%;
      background: var(--accent);
      color: #0a0e13;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      background: #33d4ff;
      box-shadow: 0 0 20px rgba(0,200,255,0.3);
    }

    .btn:active { transform: scale(0.98); }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-loader {
      display: none;
    }

    .btn.loading .btn-text { display: none; }
    .btn.loading .btn-loader { display: inline; }

    .message {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.78rem;
      display: none;
      letter-spacing: 0.03em;
    }

    .message.error {
      background: rgba(255,68,102,0.1);
      border: 1px solid rgba(255,68,102,0.3);
      color: var(--error);
      display: block;
    }

    .message.success {
      background: rgba(0,232,150,0.1);
      border: 1px solid rgba(0,232,150,0.3);
      color: var(--success);
      display: block;
    }

    .footer-note {
      text-align: center;
      margin-top: 24px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      animation: fadeUp 0.6s ease 0.3s both;
    }

    .footer-note a {
      color: var(--accent2);
      text-decoration: none;
    }

    .footer-note a:hover { text-decoration: underline; }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    .tag {
      display: inline-block;
      background: rgba(0,200,255,0.08);
      border: 1px solid rgba(0,200,255,0.15);
      color: var(--accent);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      padding: 3px 8px;
      border-radius: 4px;
      letter-spacing: 0.08em;
      margin-bottom: 20px;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="glow-bottom"></div>

  <div class="container">
    <div class="logo-area">
      <span class="logo-icon">📘</span>
      <h1>TecnoLib</h1>
      <p>// BIBLIOTECA DEL TÉCNICO</p>
    </div>

    <div class="card">
      <div class="tag">ÁREA PRIVADA</div>
      <h2 class="card-title">Acceso al Curso</h2>
      <p class="card-sub">// Ingresá con tus credenciales de alumno</p>

      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
      </div>

      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="btn" id="loginBtn" onclick="handleLogin()">
        <span class="btn-text">Ingresar →</span>
        <span class="btn-loader">Verificando...</span>
      </button>

      <div id="message" class="message"></div>

      <div class="divider"></div>

      <p style="font-size:0.75rem; color:var(--muted); font-family:'Share Tech Mono',monospace;">
        ¿Olvidaste tu contraseña? Contactanos por 
<a href="mailto:ytechcordoba@gmail.com" style="color:var(--accent2);">email</a>      </p>
    </div>


  <script>
    // =============================================
    // CONFIGURACIÓN — reemplazá con tus datos de Supabase
    // =============================================
    const SUPABASE_URL = 'https://eritxggcvjffdheksaca.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_n3a0bzLtHPU8ScXfSere-A_Wne9q--Y';
    // =============================================

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Si ya está logueado, redirigir al curso
    sb.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = 'curso.html';
    });

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const msg = document.getElementById('message');

      msg.className = 'message';
      msg.textContent = '';

      if (!email || !password) {
        showMsg('Completá email y contraseña.', 'error');
        return;
      }

      btn.classList.add('loading');
      btn.disabled = true;

      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      btn.classList.remove('loading');
      btn.disabled = false;

      if (error) {
        showMsg('Email o contraseña incorrectos.', 'error');
      } else {
        showMsg('✓ Acceso correcto, redirigiendo...', 'success');
        setTimeout(() => window.location.href = 'curso.html', 1000);
      }
    }

    function showMsg(text, type) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = 'message ' + type;
    }

    // Enter para loguear
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
