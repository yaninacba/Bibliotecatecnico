<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curso Técnico | Biblioteca del Técnico</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0a0e13;
      --surface: #111820;
      --surface2: #15202d;
      --border: #1e2d3d;
      --accent: #00c8ff;
      --accent2: #ff6b35;
      --text: #e0eaf5;
      --muted: #4a6278;
      --success: #00e896;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,200,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* AUTH GUARD */
    #authGuard {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* HEADER */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,14,19,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    #userEmail {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
    }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 6px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }

    .btn-logout:hover {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    /* LAYOUT */
    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: calc(100vh - 57px);
      position: relative;
      z-index: 1;
    }

    /* SIDEBAR */
    aside {
      border-right: 1px solid var(--border);
      padding: 28px 0;
      position: sticky;
      top: 57px;
      height: calc(100vh - 57px);
      overflow-y: auto;
    }

    .sidebar-title {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 24px 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
    }

    .module {
      margin-bottom: 4px;
    }

    .module-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 24px;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--muted);
      transition: color 0.2s, background 0.2s;
      user-select: none;
    }

    .module-header:hover { color: var(--text); background: rgba(255,255,255,0.02); }

    .module-header.active { color: var(--accent); }

    .module-icon { font-size: 1rem; flex-shrink: 0; }

    .lesson-list {
      display: none;
      padding: 4px 0;
    }

    .lesson-list.open { display: block; }

    .lesson-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 24px 8px 44px;
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Share Tech Mono', monospace;
      border-left: 2px solid transparent;
      margin-left: 24px;
    }

    .lesson-item:hover { color: var(--text); background: rgba(255,255,255,0.02); }

    .lesson-item.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: rgba(0,200,255,0.04);
    }

    .lesson-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .lesson-item.active .lesson-dot { background: var(--accent); }
    .lesson-item.done .lesson-dot { background: var(--success); }
    .lesson-item.done { color: var(--success); opacity: 0.7; }

    /* MAIN CONTENT */
    main {
      padding: 40px 48px;
      max-width: 900px;
    }

    .breadcrumb {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      margin-bottom: 20px;
      letter-spacing: 0.05em;
    }

    .breadcrumb span { color: var(--accent); }

    h2.lesson-title {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .lesson-meta {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 32px;
      display: flex;
      gap: 20px;
    }

    .lesson-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* VIDEO */
    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      border: 1px solid var(--border);
      margin-bottom: 32px;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    /* VIDEO PLACEHOLDER */
    .video-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      color: var(--muted);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      gap: 12px;
    }

    .play-icon {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: rgba(0,200,255,0.1);
      border: 2px solid rgba(0,200,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
    }

    /* CONTENT CARD */
    .content-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 20px;
    }

    .content-card h3 {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .content-card p {
      font-size: 0.9rem;
      line-height: 1.7;
      color: #b0c4d8;
      margin-bottom: 12px;
    }

    .content-card ul {
      list-style: none;
      padding: 0;
    }

    .content-card ul li {
      font-size: 0.85rem;
      color: #b0c4d8;
      padding: 6px 0;
      border-bottom: 1px solid rgba(30,45,61,0.5);
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-family: 'Share Tech Mono', monospace;
    }

    .content-card ul li::before {
      content: '→';
      color: var(--accent);
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* PDF DOWNLOAD BTN */
    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(0,200,255,0.08);
      border: 1px solid rgba(0,200,255,0.2);
      color: var(--accent);
      padding: 12px 24px;
      border-radius: 8px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.78rem;
      text-decoration: none;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }

    .btn-download:hover {
      background: rgba(0,200,255,0.15);
      box-shadow: 0 0 20px rgba(0,200,255,0.15);
    }

    /* PROGRESS BAR */
    .progress-bar-wrap {
      background: var(--border);
      border-radius: 4px;
      height: 4px;
      margin: 0 24px 20px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--success));
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .progress-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      padding: 0 24px;
      margin-bottom: 16px;
      letter-spacing: 0.05em;
    }

    .btn-next {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent2);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn-next:hover {
      background: #ff8555;
      box-shadow: 0 0 20px rgba(255,107,53,0.3);
    }

    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      aside { display: none; }
      main { padding: 24px 20px; }
      header { padding: 12px 20px; }
    }
  </style>
</head>
<body>

<div id="authGuard">// verificando acceso...</div>

<header>
  <div class="header-logo">📘 TecnoLib <span style="color:var(--muted);font-weight:400;font-size:0.7rem">/ CURSO</span></div>
  <div class="header-right">
    <span id="userEmail"></span>
    <button class="btn-logout" onclick="handleLogout()">Salir</button>
  </div>
</header>

<div class="layout">
  <aside>
    <div class="sidebar-title">Contenido del Curso</div>

    <!-- PROGRESO -->
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>
    <div class="progress-text" id="progressText">0 / 0 lecciones</div>

    <!-- MÓDULOS — EDITÁ ESTE CONTENIDO -->
    <div id="sidebarModules"></div>
  </aside>

  <main id="mainContent">
    <!-- El contenido se carga dinámicamente -->
  </main>
</div>

<script>
// =============================================
// CONFIGURACIÓN — reemplazá con tus datos
// =============================================
const SUPABASE_URL = 'https://eritxggcvjffdheksaca.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_n3a0bzLtHPU8ScXfSere-A_Wne9q--Y';

// LINK A TU PDF (subilo a Google Drive como "cualquiera con el link puede ver" y pegá el link directo)
const PDF_URL = 'https://drive.google.com/uc?export=download&id=1MeyB4pf_9Bz7CiuCTIIovbxXn5DiMH3I';// ESTRUCTURA DEL CURSO — editá esto con tus módulos y clases
// Para videos de YouTube: ponés solo el ID (lo que va después de ?v= en la URL)

const COURSE = [
  {
    id: 'm1',
    title: 'Mantenimiento ',
    icon: '🖥️',
    lessons: [
      { id: 'l16', title: 'Cambio de disco duro', duration: '10 min', video: '0XeCBZjAZ6w' },
      { id: 'l2', title: 'Fallas comunes de placa base', duration: '18 min', video: 'dQw4w9WgXcQ', desc: 'Los síntomas más frecuentes y cómo diagnosticarlos paso a paso.' },
      { id: 'l3', title: 'RAM: errores y testeo', duration: '10 min', video: 'dQw4w9WgXcQ', desc: 'Uso de MemTest y diagnóstico de módulos defectuosos.' },
    ]
  },
  {
    id: 'm2',
    title: 'Módulo 2: Fallas de Software',
    icon: '💾',
    lessons: [
      { id: 'l4', title: 'Reparación de arranque Windows', duration: '20 min', video: 'dQw4w9WgXcQ', desc: 'BOOTMGR, BCD y reparación desde USB booteable.' },
      { id: 'l5', title: 'Drivers y conflictos', duration: '15 min', video: 'dQw4w9WgXcQ', desc: 'Identificación y resolución de conflictos de controladores.' },
    ]
  },
  {
    id: 'm3',
    title: 'Módulo 3: Redes y Conectividad',
    icon: '🌐',
    lessons: [
      { id: 'l6', title: 'Diagnóstico de red', duration: '14 min', video: 'dQw4w9WgXcQ', desc: 'Herramientas de diagnóstico: ping, tracert, ipconfig.' },
      { id: 'l7', title: 'Wi-Fi y adaptadores', duration: '12 min', video: 'dQw4w9WgXcQ', desc: 'Fallas comunes de conectividad inalámbrica y sus soluciones.' },
    ]
  },
  {
    id: 'm4',
    title: '📄 Manual Completo PDF',
    icon: '📘',
    lessons: [
      { id: 'l8', title: 'Descargar manual completo', duration: 'PDF', video: null, isPdf: true, desc: 'El manual completo con todas las fallas y soluciones documentadas.' },
    ]
  }
];
// =============================================

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentLesson = null;
let completedLessons = JSON.parse(localStorage.getItem('completed') || '[]');

//auth
sb.auth.getSession().then(({ data }) => {
  document.getElementById('authGuard').style.display = 'none';
  if (!data.session) {
    //window.location.href = 'login.html';
    //return;
  }
  document.getElementById('userEmail').textContent = data.session ? data.session.user.email : 'modo prueba';
  buildSidebar();
  loadLesson(COURSE[0].lessons[0]);
});
function buildSidebar() {
  const container = document.getElementById('sidebarModules');
  container.innerHTML = '';

  COURSE.forEach((mod, mi) => {
    const modEl = document.createElement('div');
    modEl.className = 'module';

    const header = document.createElement('div');
    header.className = 'module-header' + (mi === 0 ? ' active' : '');
    header.innerHTML = `<span class="module-icon">${mod.icon}</span>${mod.title}`;
    header.onclick = () => lessonList.classList.toggle('open');

    const lessonList = document.createElement('div');
    lessonList.className = 'lesson-list' + (mi === 0 ? ' open' : '');

    mod.lessons.forEach(lesson => {
      const item = document.createElement('div');
      const isDone = completedLessons.includes(lesson.id);
      item.className = 'lesson-item' + (isDone ? ' done' : '');
      item.id = 'nav-' + lesson.id;
      item.innerHTML = `<span class="lesson-dot"></span>${lesson.title}`;
      item.onclick = () => loadLesson(lesson);
      lessonList.appendChild(item);
    });

    modEl.appendChild(header);
    modEl.appendChild(lessonList);
    container.appendChild(modEl);
  });

  updateProgress();
}

function loadLesson(lesson) {
  currentLesson = lesson;

  // Update nav active state
  document.querySelectorAll('.lesson-item').forEach(el => el.classList.remove('active'));
  const navItem = document.getElementById('nav-' + lesson.id);
  if (navItem) navItem.classList.add('active');

  const main = document.getElementById('mainContent');

  const mod = COURSE.find(m => m.lessons.some(l => l.id === lesson.id));

  main.innerHTML = `
    <div class="breadcrumb">${mod.title} <span>/ ${lesson.title}</span></div>
    <h2 class="lesson-title">${lesson.title}</h2>
    <div class="lesson-meta">
      <span>⏱ ${lesson.duration}</span>
      <span>📁 ${mod.title}</span>
    </div>

    ${lesson.isPdf ? renderPdf() : renderVideo(lesson)}

    <div class="content-card">
      <h3>📋 Descripción</h3>
      <p>${lesson.desc}</p>
    </div>

    ${!lesson.isPdf ? `
    <button class="btn-next" onclick="markDone('${lesson.id}')">
      ✓ Marcar como completado
    </button>` : ''}
  `;
}

function renderVideo(lesson) {
  if (!lesson.video) return '';
  return `
    <div class="video-wrapper">
      <iframe src="https://www.youtube.com/embed/${lesson.video}?rel=0&modestbranding=1"
        allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
      </iframe>
    </div>
  `;
}

function renderPdf() {
  return `
    <div class="content-card">
      <h3>📥 Descarga</h3>
      <p>El manual completo en PDF con todas las fallas, códigos de error y soluciones documentadas.</p>
      <a href="${https://drive.google.com/file/d/1MeyB4pf_9Bz7CiuCTIIovbxXn5DiMH3I/view?usp=sharing}" class="btn-download" target="_blank">
        📄 Descargar Manual Completo (PDF)
      </a>
    </div>
  `;
}

function markDone(lessonId) {
  if (!completedLessons.includes(lessonId)) {
    completedLessons.push(lessonId);
    localStorage.setItem('completed', JSON.stringify(completedLessons));
  }
  const navItem = document.getElementById('nav-' + lessonId);
  if (navItem) {
    navItem.classList.remove('active');
    navItem.classList.add('done');
  }
  updateProgress();

  // Find next lesson
  let found = false;
  let nextLesson = null;
  for (const mod of COURSE) {
    for (const lesson of mod.lessons) {
      if (found && !nextLesson) nextLesson = lesson;
      if (lesson.id === lessonId) found = true;
    }
  }
  if (nextLesson) loadLesson(nextLesson);
}

function updateProgress() {
  const total = COURSE.reduce((acc, m) => acc + m.lessons.filter(l => !l.isPdf).length, 0);
  const done = completedLessons.length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${total} lecciones completadas`;
}

async function handleLogout() {
  await sb.auth.signOut();
  window.location.href = 'login.html';
}
</script>
</body>
</html>
